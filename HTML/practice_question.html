<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <h1>Registration Form</h1>
    <form action="/action">
        <div>
        <input type="text" placeholder="Enter your first name" name="fname">
        <input type="text" placeholder="Enter your last name" name="lname">
        </div>
        <div>
        <label for="gender">Please select gender :</label>
        <select name="gender" id="gender">
            <option value="s">Select your gender</option>
            <option value="m">Male</option>
            <option value="f">Female</option>
            <option value="o">Others</option>
        </select>
        </div>
        <div>

            Do you agree to all terms of service? 
            <input type="checkbox" id="tos_agree" name="tos_agree">
            <label for="tos_agree">Yes, I agree</label>
        </div>
        
        <button type="submit">Submit</button>
    </form>
</body>
</html>
